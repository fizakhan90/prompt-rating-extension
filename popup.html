<!DOCTYPE html>
<html>
<head>
  <title>Prompt Rating</title>
  <style>
    body {
      width: 350px;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 15px;
      margin: 0;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .api-key-section {
      margin-bottom: 15px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-weight: 500;
      color: #374151;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }

    textarea {
      height: 120px;
      resize: vertical;
    }

    button {
      padding: 10px 16px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #1d4ed8;
    }

    button:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
    }

    .results {
      margin-top: 15px;
      padding: 12px;
      border-radius: 6px;
      background-color: #f3f4f6;
    }

    .error {
      color: #dc2626;
      background-color: #fee2e2;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      margin-top: 8px;
    }

    .rating {
      font-size: 24px;
      font-weight: bold;
      color: #1f2937;
      margin-bottom: 10px;
    }

    .section {
      margin-top: 8px;
    }

    .section-title {
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #4b5563;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="api-key-section">
      <div class="input-group">
        <label for="apiKey">Gemini API Key</label>
        <input type="text" id="apiKey" placeholder="Enter your Gemini API key">
      </div>
    </div>

    <div class="input-group">
      <label for="promptInput">Enter Prompt</label>
      <textarea 
        id="promptInput" 
        placeholder="Enter your prompt here for analysis..."
      ></textarea>
    </div>

    <button id="ratePromptBtn">Analyze Prompt</button>

    <div id="results" class="results" style="display: none">
      <div id="loading" class="loading" style="display: none">
        <div class="spinner"></div>
        Analyzing prompt...
      </div>
      <div id="content"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
